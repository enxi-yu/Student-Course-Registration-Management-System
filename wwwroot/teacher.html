<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教师端 - 学生选课管理系统</title>
  <link rel="stylesheet" href="css/teacher.css">
</head>
<body>
  <div class="teacher-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">SC</div>
        <div>
          <div class="brand-title">教师端</div>
          <div class="brand-subtitle">Course Manager</div>
        </div>
      </div>

      <nav class="nav-menu" aria-label="教师端菜单">
        <button class="nav-item active" type="button" data-page="dashboard">首页</button>
        <button class="nav-item" type="button" data-page="courses">我的课程</button>
        <button class="nav-item" type="button" data-page="schedule">我的课表</button>
        <button class="nav-item" type="button" data-page="students">选课名单</button>
        <button class="nav-item" type="button" data-page="scores">成绩录入</button>
        <button class="nav-item" type="button" data-page="applications">开课申请</button>
        <button class="nav-item" type="button" data-page="password">修改密码</button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <h1>学生选课管理系统</h1>
          <p id="view-subtitle">教师端后台管理</p>
        </div>
        <div class="topbar-actions">
          <span class="role-pill">当前角色：教师</span>
          <span class="teacher-pill" id="teacher-summary">未登录</span>
          <button class="logout-button" type="button" id="logout-button">退出登录</button>
        </div>
      </header>

      <main class="content">
        <div class="content-heading">
          <div>
            <h2 id="view-title">首页</h2>
            <p id="view-description">查看教师端概览数据</p>
          </div>
          <span class="term-badge">公共登录后进入</span>
        </div>

        <div id="message-root"></div>
        <div id="page-root"></div>
      </main>
    </section>
  </div>

  <script src="js/api.js"></script>
  <script src="js/pages/teacher-dashboard.js"></script>
  <script src="js/pages/teacher-courses.js"></script>
  <script src="js/pages/teacher-schedule.js"></script>
  <script src="js/pages/class-students.js"></script>
  <script src="js/pages/score-entry.js"></script>
  <script src="js/pages/course-application.js"></script>
  <script src="js/teacher-app.js"></script>
</body>
</html>
